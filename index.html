<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;background:#f2f1ed;color:#1a1a1a;font-size:15px;line-height:1.6}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 22px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;white-space:nowrap}

.slip{border:1px solid #999;padding:1.25rem 1.5rem;font-size:13px;page-break-inside:avoid}
.slip+.slip{border-top:2px dashed #bbb}
.slip-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #ddd}

  .btn-logout{width:auto;padding:4px 12px;font-size:12px;border-radius:6px}
  .nav-group-label{display:none}

  .g3,.g4{grid-template-columns:1fr 1fr}

<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">載入中...</div>
</div>

<div id="login-screen" style="display:none">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <h1>和木餐飲</h1>
        <p>富郁霖企業社｜營運管理系統</p>
      </div>
      <div class="login-error" id="login-error"></div>
      <div id="google-signin-btn" style="display:flex;justify-content:center;margin:1.5rem 0"></div>
      <div style="font-size:12px;color:#aaa;text-align:center">使用公司 Google 帳號登入，帳號需由管理員授權</div>
    </div>
  </div>
</div>

<div id="app-screen" style="display:none">
<div class="app">
<nav class="sidebar">
  <div class="sidebar-logo">
    <h1>和木餐飲</h1>
    <p>雙品牌營運系統</p>

  </div>

    <button class="btn-logout" onclick="doLogout()">登出</button>

<script>
const API = 'https://script.google.com/macros/s/AKfycbw-G6nMGsOQeqCTM9GgMWkzNk4bwB5ABBAEiF9ynzdQgqWWmxfe0ulgdxUnuFaK523m/exec';
const GOOGLE_CLIENT_ID = '356556784698-cprpmi8ht0r2qn4fuprrptls4ffubfuc.apps.googleusercontent.com';
const 品牌名稱 = {a:'林家涼麵', b:'木谷食麵所'};
const 角色名稱 = {staff:'員工', manager:'店長', owner:'老闆'};
const 品牌標籤 = {a:'林家涼麵', b:'木谷食麵所', both:'兩店'};
let 目前使用者 = null;
let 品牌設定 = {
  a:{rent:23000,pos:0,platform:500,phone:0,ads:0,other:0,lp_rate:3,uber_rate:31},
  b:{rent:0,pos:0,platform:500,phone:0,ads:0,other:0,lp_rate:3,uber_rate:31}
};
let claudeApiKey = '';

function 格式化金額(v){return Math.round(v||0).toLocaleString('zh-TW')}
function 取應交現金(r){
  // 若有存 handover 且不為 0 就用存的，否則即時計算
  if(r.handover&&+r.handover!==0)return+r.handover;
  return(+r.cash||0)-(+r.market||0)-(+r.pack||0)-(+r.meal||0)-(+r.gas||0);
}
function 格式化日期(d){
  if(!d)return '';
  if(d.includes('T')){const dt=new Date(d);return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}
  return d.slice(0,10);
}
function 今日日期(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function 百分比(v,t){return t?((v/t)*100).toFixed(1)+'%':'—'}
function 數值(id){return parseFloat(document.getElementById(id)?.value)||0}
function 文字(id){return document.getElementById(id)?.value||''}
function 固定成本(s){return(s.rent||0)+(s.platform||0)+(s.pos||0)+(s.phone||0)+(s.ads||0)+(s.other||0)}
function 取得ApiKey(){return claudeApiKey||localStorage.getItem('hm_claude_key')||''}
function 設定ApiKey(k){localStorage.setItem('hm_claude_key',k.trim())}

function 提示(訊息){
  const t=document.getElementById('toast');
  t.textContent=訊息;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500)
}
function 載入中(顯示,訊息='處理中...'){
  const el=document.getElementById('loading');
  el.style.display=顯示?'flex':'none';
  if(訊息)el.querySelector('.loading-text').textContent=訊息;
}

async function 呼叫API(參數){
  const res=await fetch(API+'?t='+Date.now(),{method:'POST',body:JSON.stringify(參數)});
  const text=await res.text();
  try{return JSON.parse(text);}
  catch(e){console.error('API回傳非JSON:',text.slice(0,500));throw new Error(text.slice(0,200));}
}

// ===== 登入登出 =====
async function 初始化(){
  const saved=localStorage.getItem('hm_user');
  if(saved){
    目前使用者=JSON.parse(saved);
    await 載入品牌設定();
    顯示主介面();
  } else {
    載入中(false);
    document.getElementById('login-screen').style.display='block';
    if(window.google?.accounts?.id) 初始化Google登入();
    else window.onGoogleLibraryLoad=初始化Google登入;
  }
}

function 初始化Google登入(){
  google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleGoogleCredential,auto_select:false});
  google.accounts.id.renderButton(
    document.getElementById('google-signin-btn'),
    {type:'standard',size:'large',theme:'outline',text:'signin_with',shape:'rectangular',logo_alignment:'left',width:320}
  );
}

async function handleGoogleCredential(resp){
  載入中(true,'驗證中...');
  const res=await 呼叫API({action:'googleLogin',token:resp.credential});
  if(!res.ok){
    載入中(false);
    const el=document.getElementById('login-error');
    el.textContent=res.error||'此 Google 帳號尚未授權，請聯繫老闆';
    el.style.display='block';
    return;
  }
  目前使用者=res.user;
  localStorage.setItem('hm_user',JSON.stringify(目前使用者));
  await 載入品牌設定();
  顯示主介面();
}

function doLogout(){
  localStorage.removeItem('hm_user');
  目前使用者=null;
  if(window.google?.accounts?.id) google.accounts.id.disableAutoSelect();
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='block';
  document.getElementById('login-error').style.display='none';
  if(window.google?.accounts?.id) 初始化Google登入();
  else window.onGoogleLibraryLoad=初始化Google登入;
}

function 顯示登入錯誤(訊息){

function 建立頁面(role,brand){
  const main=document.getElementById('main-content');
  let pages=[];

  }

function 切換頁面(page){
  localStorage.setItem('hm_last_page',page);
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('page-'+page);
  if(el)el.classList.add('active');
  document.querySelectorAll(`.nav-item[data-page="${page}"]`).forEach(el=>el.classList.add('active'));
  const br=page.split('-').pop();
  // 依品牌切換背景色與側邊欄顏色（莫蘭迪風格）
  const main=document.querySelector('.main');
  const sidebar=document.querySelector('.sidebar');
  const isBrA=br==='a';
  const isBrB=br==='b';
  if(main){
    if(isBrA){main.style.background='#f0e9e1';} // 林家：莫蘭迪奶茶米
    else if(isBrB){main.style.background='#e3eae3';} // 木谷：莫蘭迪霧鼠尾草
    else{main.style.background='#ede9e4';} // 總部：莫蘭迪米白
  }
  if(sidebar){
    let sidebarBg, sidebarBorder, dividerColor;
    if(isBrA){
      sidebarBg='#7a6455'; sidebarBorder='#c4a882'; dividerColor='rgba(255,255,255,0.12)';
    } else if(isBrB){
      sidebarBg='#556b57'; sidebarBorder='#8aab8c'; dividerColor='rgba(255,255,255,0.12)';
    } else {
      sidebarBg='#8c8479'; sidebarBorder='#b5aca0'; dividerColor='rgba(255,255,255,0.12)';
    }
    sidebar.style.background=sidebarBg;
    sidebar.style.borderRight=`3px solid ${sidebarBorder}`;
    // 更新內部分隔線顏色
    sidebar.querySelectorAll('.sidebar-logo,.sidebar-user,.sidebar-bottom,.nav-group').forEach(el=>{
      el.style.borderColor=dividerColor;
    });
  }
  if(page.startsWith('上傳-'))渲染上傳頁(br);
  else if(page.startsWith('確認-'))渲染確認頁(br);
  else if(page.startsWith('每日-'))渲染每日表單(br);
  else if(page.startsWith('歷史-'))渲染歷史記錄(br);
  else if(page.startsWith('月報-'))渲染月報選擇(br);
  else if(page.startsWith('薪資-'))渲染薪資頁(br);
  else if(page==='總部')渲染總部選擇();
  else if(page==='資金管理')渲染資金管理();
  else if(page==='帳號管理')渲染帳號管理();
  else if(page==='系統設定')渲染系統設定();
  else if(page==='批發管理')渲染批發管理();
  else if(page==='批次上傳')渲染批次上傳();
  else if(page==='原物料管理')渲染原物料管理();
  else if(page==='商品管理')渲染商品管理();
  else if(page==='成本表')渲染成本表();
}

function 處理檔案(br,file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{const p=document.getElementById(`pv-${br}`);p.src=e.target.result;p.style.display='block';};
  r.readAsDataURL(file);
  const btn=document.getElementById(`scbtn-${br}`);if(btn)btn.disabled=false;
}

function 計算表單(br){
  const cash=數值(`d${br}-cash`),lp=數值(`d${br}-lp`),tw=數值(`d${br}-tw`),uber=數值(`d${br}-uber`),panda=數值(`d${br}-panda`);
  const total=cash+lp+tw+uber+panda,guests=數值(`d${br}-guests`);
  const lpRate=數值(`d${br}-lprate`)/100,uberRate=數值(`d${br}-uberrate`)/100,pandaRate=數值(`d${br}-pandarate`)/100;
  const pFee=lp*lpRate+uber*uberRate+panda*pandaRate;
  const market=數值(`d${br}-market`),pack=數值(`d${br}-pack`),meal=數值(`d${br}-meal`),gas=數值(`d${br}-gas`);
  const totalExpense=market+pack+meal+gas;
  const reserve=數值(`d${br}-reserve`);
  const calcBal=reserve-totalExpense;
  const handover=cash-totalExpense;
  const cashShould=數值(`d${br}-cashShould`),cashActual=數值(`d${br}-cashActual`);
  const 設定元素=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  設定元素(`d${br}-total`,'$'+格式化金額(total));
  設定元素(`d${br}-aov`,guests?'客單價：$'+格式化金額(total/guests):'客單價：—');
  設定元素(`d${br}-pfee`,'$'+格式化金額(pFee));
  設定元素(`d${br}-calcbal`,'$'+格式化金額(calcBal));
  const hoEl=document.getElementById(`d${br}-handover`);
  if(hoEl){hoEl.textContent='$'+格式化金額(handover);hoEl.style.color=handover<0?'#c0392b':'#e67e22';}
  const handoverActual=數值(`d${br}-handover-actual`);
  const diffEl2=document.getElementById(`d${br}-handover-diff`);
  if(diffEl2){
    if(handoverActual){const d=handoverActual-handover;diffEl2.textContent=(d>=0?'+':'')+格式化金額(d);diffEl2.style.color=d===0?'#27ae60':Math.abs(d)>50?'#c0392b':'#e67e22';}
    else{diffEl2.textContent='—';diffEl2.style.color='#aaa';}
  }
  const soEl=document.getElementById(`d${br}-shortover`);
  if(soEl){
    if(cashShould&&cashActual){const so=cashActual-cashShould;soEl.textContent=(so>=0?'+':'')+格式化金額(so);soEl.style.color=so===0?'#27ae60':so>0?'#2980b9':'#c0392b';}
    else soEl.textContent='—';
  }
}

async function 執行AI辨識(br){
  const apiKey=取得ApiKey();
  if(!apiKey){提示('請先輸入 Claude API 金鑰');return}
  const file=document.getElementById(`sc-${br}`)?.files[0];
  if(!file){提示('請先上傳照片');return}
  const statusEl=document.getElementById(`ast-${br}`);
  statusEl.className='ai-status loading';
  statusEl.innerHTML='<div class="ai-spinner"></div><span>AI 辨識中，請稍候...</span>';
  try{
    const base64=await 壓縮照片(file);
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:500,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
        {type:'text',text:'從這張台灣餐廳結帳單提取數據，只回傳JSON，不要其他文字。欄位：cash(現金收入),linepay(LINE Pay 與線上點餐金流的金額加總),twpay(台灣PAY),uber(Uber門市實收),guests(交易筆數),cashShould(錢櫃應收現金),cashActual(錢櫃實點現金),voidAmt(作廢金額),txItems(銷售數量)。找不到設0。'}
      ]}]})
    });
    if(!resp.ok){const errBody=await resp.json().catch(()=>({}));throw new Error(`API錯誤 ${resp.status}：${errBody?.error?.message||JSON.stringify(errBody)}`);}
    const data=await resp.json();
    const match=data.content[0].text.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('無法解析回應');
    const r=JSON.parse(match[0]);
    const 欄位對應={cash:`d${br}-cash`,linepay:`d${br}-lp`,twpay:`d${br}-tw`,uber:`d${br}-uber`,guests:`d${br}-guests`,cashShould:`d${br}-cashShould`,cashActual:`d${br}-cashActual`,voidAmt:`d${br}-void`,txItems:`d${br}-txItems`};
    let 填入數量=0;
    Object.entries(欄位對應).forEach(([k,fid])=>{
      const el=document.getElementById(fid);
      if(el&&r[k]){el.value=r[k];el.classList.add('ai-filled');填入數量++;}
    });
    計算表單(br);
    statusEl.className='ai-status success';
    statusEl.innerHTML=`<span>✓ 成功辨識並填入 ${填入數量} 個欄位！帶橘色框線的為自動填入，請確認後儲存。</span>`;
    提示(`✓ 已自動填入 ${填入數量} 個欄位`);
  }catch(err){
    statusEl.className='ai-status error';
    statusEl.innerHTML=`<span>✗ 辨識失敗：${err.message}，請重新拍攝清晰照片或手動輸入。</span>`;
  }
}

async function 儲存每日記錄(br){
  const date=文字(`d${br}-date`);if(!date){提示('請選擇日期');return}
  const cash=數值(`d${br}-cash`),lp=數值(`d${br}-lp`),tw=數值(`d${br}-tw`),uber=數值(`d${br}-uber`),panda=數值(`d${br}-panda`);
  const total=cash+lp+tw+uber+panda;
  const lpRate=數值(`d${br}-lprate`)/100,uberRate=數值(`d${br}-uberrate`)/100,pandaRate=數值(`d${br}-pandarate`)/100;
  const pFee=lp*lpRate+uber*uberRate+panda*pandaRate;
  const market=數值(`d${br}-market`),central=數值(`d${br}-central`),pack=數值(`d${br}-pack`);
  const meal=數值(`d${br}-meal`),gas=數值(`d${br}-gas`);
  const totalExpense=market+pack+meal+gas;
  const reserve=數值(`d${br}-reserve`);
  const handover=cash-totalExpense;
  const calc_bal=reserve-totalExpense;
  const cashShould=數值(`d${br}-cashShould`),cashActual=數值(`d${br}-cashActual`);
  let photoData='';
  const photoFile=document.getElementById(`sc-${br}`)?.files[0];
  if(photoFile){try{photoData=await 壓縮照片(photoFile);}catch(e){}}
  if(photoData) sessionStorage.setItem(`receipt-${br}-${date}`,photoData);
  載入中(true,'儲存中...');
  const res=await 呼叫API({action:'saveRecord',record:{
    brand:br,date,weather:文字(`d${br}-weather`),hours:數值(`d${br}-hours`),guests:數值(`d${br}-guests`),
    cash,lp,tw,uber,panda,total,lp_rate:數值(`d${br}-lprate`),uber_rate:數值(`d${br}-uberrate`),panda_rate:數值(`d${br}-pandarate`),p_fee:pFee,
    market,central,pack,food_cost:market+central,meal,gas,misc:數值(`d${br}-misc`),
    cash_should:cashShould,cash_actual:cashActual,cash_short_over:cashActual-cashShould,
    void_amt:數值(`d${br}-void`),tx_items:數值(`d${br}-txItems`),
    reserve,calc_bal,handover,handover_actual:數值(`d${br}-handover-actual`),handover_diff:數值(`d${br}-handover-actual`)?數值(`d${br}-handover-actual`)-handover:0,
    note:文字(`d${br}-note`),uploaded_by:目前使用者?.email,photo:photoData
  }});
  載入中(false);
  if(!res.ok){提示('儲存失敗：'+res.error);return}
  提示('✓ 已儲存 '+date);
  渲染每日表單(br);
}

function 處理上傳檔案(br,file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{const p=document.getElementById(`pv-u${br}`);p.src=e.target.result;p.style.display='block';};
  r.readAsDataURL(file);
  const btn=document.getElementById(`scbtn-u${br}`);if(btn)btn.disabled=false;
}

function 計算上傳(br){
  const cash=數值(`u${br}-cash`),lp=數值(`u${br}-lp`),tw=數值(`u${br}-tw`),uber=數值(`u${br}-uber`),panda=數值(`u${br}-panda`);
  const total=cash+lp+tw+uber+panda,guests=數值(`u${br}-guests`);
  const cashShould=數值(`u${br}-cashShould`),cashActual=數值(`u${br}-cashActual`);
  const market=數值(`u${br}-market`);
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set(`u${br}-total`,'$'+格式化金額(total));
  set(`u${br}-aov`,guests?'客單價：$'+格式化金額(total/guests):'客單價：—');
  const handover=cash-market;
  const hoEl=document.getElementById(`u${br}-handover`);
  if(hoEl){hoEl.textContent='$'+格式化金額(handover);hoEl.style.color=handover<0?'#c0392b':'#e67e22';}
  const actual=數值(`u${br}-handover-actual`);
  const diffEl=document.getElementById(`u${br}-handover-diff`);
  if(diffEl){if(actual){const d=actual-handover;diffEl.textContent=(d>=0?'+':'')+格式化金額(d);diffEl.style.color=Math.abs(d)<=50?'#27ae60':'#c0392b';}else{diffEl.textContent='—';diffEl.style.color='#aaa';}}
  const soEl=document.getElementById(`u${br}-shortover`);
  if(soEl&&cashShould&&cashActual){const so=cashActual-cashShould;soEl.textContent=(so>=0?'+':'')+格式化金額(so);soEl.style.color=so===0?'#27ae60':so>0?'#2980b9':'#c0392b';}
}

async function 執行員工AI辨識(br){
  const apiKey=取得ApiKey();
  if(!apiKey){提示('請先輸入 Claude API 金鑰');return}
  const file=document.getElementById(`sc-u${br}`)?.files[0];
  if(!file){提示('請先上傳照片');return}
  const statusEl=document.getElementById(`ast-u${br}`);
  statusEl.className='ai-status loading';
  statusEl.innerHTML='<div class="ai-spinner"></div><span>AI 辨識中，請稍候...</span>';
  try{
    const base64=await 壓縮照片(file);
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:500,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
        {type:'text',text:'從這張台灣餐廳結帳單提取數據，只回傳JSON。欄位：cash,linepay,twpay,uber,guests,cashShould,cashActual,voidAmt,txItems。找不到設0。'}
      ]}]})
    });
    if(!resp.ok){const errBody=await resp.json().catch(()=>({}));throw new Error(`API錯誤 ${resp.status}：${errBody?.error?.message||JSON.stringify(errBody)}`);}
    const data=await resp.json();
    const match=data.content[0].text.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('無法解析');
    const r=JSON.parse(match[0]);
    const map={cash:`u${br}-cash`,linepay:`u${br}-lp`,twpay:`u${br}-tw`,uber:`u${br}-uber`,guests:`u${br}-guests`,cashShould:`u${br}-cashShould`,cashActual:`u${br}-cashActual`,voidAmt:`u${br}-void`};
    let count=0;
    Object.entries(map).forEach(([k,fid])=>{const el=document.getElementById(fid);if(el&&r[k]){el.value=r[k];el.classList.add('ai-filled');count++;}});
    計算上傳(br);
    statusEl.className='ai-status success';
    statusEl.innerHTML=`<span>✓ 成功填入 ${count} 個欄位！請確認後送出。</span>`;
  }catch(err){statusEl.className='ai-status error';statusEl.innerHTML=`<span>✗ 辨識失敗：${err.message}</span>`;}
}

async function 壓縮照片(file){
  return new Promise(resolve=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const maxW=400,scale=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas');
      c.width=img.width*scale;c.height=img.height*scale;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg',0.4).split(',')[1]);
    };
    img.src=url;
  });
}

async function 送出上傳(br){
  const date=文字(`u${br}-date`);if(!date){提示('請選擇日期');return}
  const cash=數值(`u${br}-cash`),lp=數值(`u${br}-lp`),tw=數值(`u${br}-tw`),uber=數值(`u${br}-uber`),panda=數值(`u${br}-panda`);
  const total=cash+lp+tw+uber+panda;
  const s=品牌設定[br]||{lp_rate:3,uber_rate:31};
  const pFee=lp*(s.lp_rate/100)+uber*(s.uber_rate/100);
  const cashShould=數值(`u${br}-cashShould`),cashActual=數值(`u${br}-cashActual`);
  載入中(true,'送出中...');
  let photoData='';
  const photoFile=document.getElementById(`sc-u${br}`)?.files[0];
  if(photoFile){try{photoData=await 壓縮照片(photoFile);}catch(e){}}
  if(photoData) sessionStorage.setItem(`receipt-${br}-${date}`,photoData);
  const res=await 呼叫API({action:'saveRecord',record:{
    brand:br,date,weather:文字(`u${br}-weather`),guests:數值(`u${br}-guests`),
    cash,lp,tw,uber,panda,total,lp_rate:s.lp_rate,uber_rate:s.uber_rate,p_fee:pFee,
    cash_should:cashShould,cash_actual:cashActual,cash_short_over:cashActual-cashShould,
    void_amt:數值(`u${br}-void`),
    market:數值(`u${br}-market`),central:數值(`u${br}-central`),
    pack:數值(`u${br}-pack`),meal:數值(`u${br}-meal`),
    gas:數值(`u${br}-gas`),misc:數值(`u${br}-misc`),
    note:文字(`u${br}-note`),uploaded_by:目前使用者?.email,
    handover:cash-數值(`u${br}-market`),
    handover_actual:數值(`u${br}-handover-actual`)||null,
    handover_diff:數值(`u${br}-handover-actual`)?數值(`u${br}-handover-actual`)-(cash-數值(`u${br}-market`)):null,
    photo:photoData
  }});
  載入中(false);
  if(!res.ok){提示('送出失敗：'+res.error);return}
  提示('✓ 結帳單已成功送出！');
  切換頁面('確認-'+br);
}

async function 渲染歷史記錄(br){

  載入中(true);
  const res=await 呼叫API({action:'getRecords',brand:br,role:目前使用者?.role});
  載入中(false);

  const d=v-sys;

  el.style.color=Math.abs(d)<=100?'#27ae60':'#c0392b';

async function 儲存快速補填(br,ids){
  載入中(true,'儲存中...');

    if(!input||input.value==='')continue;
    const actual=+input.value||0;
    const sysEl=input.closest('tr')?.querySelector('td:nth-child(2)');

}

async function 儲存修改(){
  const id=window._editId,br=window._editBrand,existingPhoto=window._editPhoto||'';
  const g=k=>document.getElementById('edit-'+k);
  const n=k=>+(g(k)?.value)||0;
  const cash=n('cash'),lp=n('lp'),tw=n('tw'),uber=n('uber'),panda=n('panda');
  const total=cash+lp+tw+uber+panda;
  const s=品牌設定[br]||{lp_rate:3,uber_rate:31};
  const market=n('market'),pack=n('pack'),meal=n('meal'),gas=n('gas');
  const totalExpense=market+pack+meal+gas;
  const handover=cash-totalExpense;
  const calc_bal=n('reserve')-totalExpense;
  let photo=existingPhoto;
  const photoFile=g('photo')?.files[0];
  if(photoFile){try{photo=await 壓縮照片(photoFile);}catch(e){}}
  const record={
    brand:br,
    date:g('date')?.value,weather:g('weather')?.value,
    guests:n('guests'),cash,lp,tw,uber,panda,total,
    p_fee:lp*(s.lp_rate/100)+uber*(s.uber_rate/100),
    market,central:n('central'),pack,meal,gas,misc:n('misc'),
    food_cost:market+n('central'),
    reserve:n('reserve'),calc_bal,handover,
    handover_actual:n('handover_actual'),handover_diff:n('handover_actual')?n('handover_actual')-handover:0,
    note:g('note')?.value,photo
  };
  載入中(true,'儲存中...');
  // 先刪除舊記錄，再新增，確保所有欄位都能正確更新
  const delRes=await 呼叫API({action:'deleteRecord',id});
  if(!delRes.ok){載入中(false);提示('修改失敗：'+(delRes.error||'刪除舊記錄失敗'));return}
  const addRes=await 呼叫API({action:'saveRecord',record});
  載入中(false);
  if(!addRes.ok){提示('修改失敗：'+(addRes.error||'新增記錄失敗'));return}
  提示('✓ 已成功修改');
  關閉詳細();
  渲染歷史記錄(br);
}

function 建立月報HTML(recs,s,pl,allRecs=[]){
  if(!recs.length)return'<div style="color:#aaa;padding:1rem;text-align:center">該月尚無記錄</div>';
  const n=k=>recs.reduce((a,r)=>a+(+r[k]||0),0);
  const tRev=n('total'),tCash=n('cash'),tLP=n('lp'),tTW=n('tw'),tUber=n('uber'),tPFee=n('p_fee');
  const tFood=n('food_cost'),tPack=n('pack'),tMeal=n('meal'),tGas=n('gas'),tMisc=n('misc');
  const tGuests=n('guests'),tHours=n('hours'),laborTotal=pl.total;
  const fxC=固定成本(s),tCost=fxC+tFood+tPack+tMeal+tGas+tMisc+tPFee+laborTotal,netProfit=tRev-tCost;
  const aov=tGuests?tRev/tGuests:0,productivity=tHours?tRev/tHours:0;
  const foodRate=tRev?tFood/tRev*100:0,laborRate=tRev?laborTotal/tRev*100:0;
  const rentRate=tRev?(s.rent||0)/tRev*100:0,profitRate=tRev?netProfit/tRev*100:0;
  const varCost=tFood+tPack+tMeal+tGas+tMisc+tPFee,varRate=tRev?varCost/tRev:0.4;

        <div style="display:flex;flex-direction:column;gap:8px;justify-content:center">
          <div class="sum-row"><span style="color:#888">日均營收</span><span style="font-weight:600">$${格式化金額(Math.round(avg))}</span></div>
          <div class="sum-row"><span style="color:#888">最高單日</span><span style="color:#27ae60;font-weight:600">$${格式化金額(maxV)}</span></div>
          <div class="sum-row"><span style="color:#888">最低單日</span><span style="color:#c0392b;font-weight:600">$${格式化金額(minV)}</span></div>
          <div class="sum-row"><span style="color:#888">超均值天數</span><span>${above} / ${vals.length} 天</span></div>
        </div>
      </div>
    </div>`;
  })()}
  ${(()=>{
    // D. 固定成本結構拆解
    const items=[
      ['房租',s.rent||0,'#c8a96e'],
      ['平台月費',s.platform||0,'#7bb5a0'],
      ['POS 系統',s.pos||0,'#9b8ec4'],
      ['電話網路',s.phone||0,'#e8a87c'],
      ['廣告費',s.ads||0,'#6db3d4'],
      ['其他固定',s.other||0,'#aaa']
    ].filter(([,v])=>v>0);
    if(!items.length)return'';
    const fixTotal=items.reduce((a,[,v])=>a+v,0);
    return`<div class="card"><div class="card-title-lg">🏗 固定成本結構</div>
      <div style="font-size:12px;color:#888;margin-bottom:12px">合計 <strong>$${格式化金額(fixTotal)}</strong> ／ 佔月營收 <strong style="color:${tRev&&fixTotal/tRev>0.3?'#c0392b':'#1a1a1a'}">${tRev?((fixTotal/tRev)*100).toFixed(1):0}%</strong></div>
      ${items.map(([l,v,color])=>{
        const pct=fixTotal?v/fixTotal*100:0;
        return`<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
            <span style="display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:50%;background:${color};display:inline-block"></span>${l}</span>
            <span>$${格式化金額(v)} <span style="color:#aaa;font-size:11px">${pct.toFixed(1)}%</span></span>
          </div>
          <div style="background:#eee;border-radius:4px;height:6px"><div style="background:${color};border-radius:4px;height:6px;width:${Math.min(pct,100)}%"></div></div>
        </div>`;
      }).join('')}
    </div>`;
  })()}
  ${(()=>{
    // E. 客單價趨勢（近6個月）
    const aovMap={};
    allRecs.forEach(r=>{
      const m=格式化日期(r.date).slice(0,7);
      if(!aovMap[m])aovMap[m]={rev:0,guests:0};
      aovMap[m].rev+=(+r.total||0);
      aovMap[m].guests+=(+r.guests||0);
    });
    const months=Object.keys(aovMap).sort().slice(-6);
    if(months.length<2)return'';
    const aovs=months.map(m=>aovMap[m].guests?Math.round(aovMap[m].rev/aovMap[m].guests):0);
    const maxAov=Math.max(...aovs,1);
    const lastTwo=aovs.slice(-2);
    const aovChange=lastTwo[0]?((lastTwo[1]-lastTwo[0])/lastTwo[0]*100):0;
    const curAov=aovs[aovs.length-1];
    return`<div class="card"><div class="card-title-lg">🎯 客單價趨勢（近${months.length}個月）</div>
      <div style="display:flex;align-items:flex-end;gap:8px;height:100px;padding:8px 0">

            <div style="font-size:10px;color:#888">$${aovs[i]}</div>
            <div style="width:100%;background:${isCurrent?(ok?'#27ae60':'#c0392b'):'#ddd'};border-radius:4px 4px 0 0;height:${pct}%;min-height:4px;transition:.3s"></div>
            <div style="font-size:10px;color:#888">${m.slice(5)}月</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:16px;margin-top:8px;flex-wrap:wrap;align-items:center">
        <div style="font-size:12px;color:#888">月增率：<span style="font-weight:600;color:${aovChange>=0?'#27ae60':'#c0392b'}">${aovChange>=0?'+':''}${aovChange.toFixed(1)}%</span></div>
        <div style="font-size:12px;color:#888">本月客單：<span style="font-weight:600">$${curAov}</span></div>
        <div style="font-size:12px;color:#888">目標：<span style="font-weight:600">$120</span></div>
        ${curAov>=120?'<div style="font-size:12px;color:#27ae60;font-weight:600">✓ 達標</div>':'<div style="font-size:12px;color:#c0392b;font-weight:600">⚠ 未達目標</div>'}
      </div>
    </div>`;
  })()}`;
}

async function 儲存員工資料(br,id=''){
  const g=k=>document.getElementById(`sf-${br}-${k}`)?.value||'';
  const profile={
    brand:br,name:g('name'),id_no:g('id_no'),join_date:g('join_date'),birth_date:g('birth_date'),
    address:g('address'),phone:g('phone'),mobile:g('mobile'),email:g('email'),
    edu:g('edu'),school:g('school'),major:g('major'),
    emergency_name:g('emergency_name'),emergency_rel:g('emergency_rel'),emergency_phone:g('emergency_phone'),emergency_addr:g('emergency_addr'),
    role:g('role'),title:g('title'),labor_date:g('labor_date'),
    base:+g('base')||0,nhi_emp:+g('nhi_emp')||0,nhi_co:+g('nhi_co')||0,
    note:g('note'),active:true
  };
  if(id)profile.id=id;
  if(!profile.name){提示('請輸入姓名');return}
  載入中(true,'儲存中...');
  const res=await 呼叫API({action:'saveStaffProfile',profile});
  載入中(false);
  if(!res.ok){提示('儲存失敗：'+res.error);return}
  提示('✓ 已儲存');管理員工資料(br);
}

async function 渲染總部報表(ym){
  const recsA=(window._allHQRecs?.a||[]).filter(r=>r.date?.startsWith(ym));
  const recsB=(window._allHQRecs?.b||[]).filter(r=>r.date?.startsWith(ym));
  載入中(true);
  const [payResA,payResB]=await Promise.all([
    呼叫API({action:'getPayroll',brand:'a',month:ym}),
    呼叫API({action:'getPayroll',brand:'b',month:ym})
  ]);
  載入中(false);
  const sA=品牌設定['a']||{},sB=品牌設定['b']||{};

  function 計算品牌(recs,s,emps){
    const n=k=>recs.reduce((a,r)=>a+(+r[k]||0),0);
    const tRev=n('total'),tFood=n('food_cost'),tPack=n('pack'),tMeal=n('meal'),tGas=n('gas'),tMisc=n('misc'),tPFee=n('p_fee');
    const tGuests=n('guests'),tHours=n('hours');
    const nhiCo=emps.reduce((a,e)=>a+(+e.nhi_co||0),0);
    const salary=emps.reduce((a,e)=>a+((+e.base||0)+(+e.overtime||0)+(+e.bonus||0)-(+e.absent||0)-(+e.nhi_emp||0)),0);
    const laborTotal=salary+nhiCo;
    const fxC=固定成本(s),tCost=fxC+tFood+tPack+tMeal+tGas+tMisc+tPFee+laborTotal,netProfit=tRev-tCost;
    const foodRate=tRev?tFood/tRev*100:0,laborRate=tRev?laborTotal/tRev*100:0;
    const rentRate=tRev?(s.rent||0)/tRev*100:0,profitRate=tRev?netProfit/tRev*100:0;
    return{tRev,tFood,tPack,tMeal,tGas,tMisc,tPFee,tGuests,tHours,laborTotal,nhiCo,salary,fxC,tCost,netProfit,
      aov:tGuests?tRev/tGuests:0,productivity:tHours?tRev/tHours:0,
      foodRate,laborRate,rentRate,profitRate,days:recs.length,rent:s.rent||0,fixedOther:fxC-(s.rent||0)};
  }

  const A=計算品牌(recsA,sA,payResA.data||[]),B=計算品牌(recsB,sB,payResB.data||[]);

  const tGuests=A.tGuests+B.tGuests,tFood=A.tFood+B.tFood,tPFee=A.tPFee+B.tPFee;
  const tLabor=A.laborTotal+B.laborTotal,tRent=A.rent+B.rent;
  const cfoodRate=tRev?tFood/tRev*100:0,claborRate=tRev?tLabor/tRev*100:0;
  const crentRate=tRev?tRent/tRev*100:0,cprofitRate=tRev?tProfit/tRev*100:0;
  const aShareRev=tRev?A.tRev/tRev*100:0;
  const allRecs=[...recsA.map(r=>({...r,brand:'a'})),...recsB.map(r=>({...r,brand:'b'}))].sort((a,b)=>b.total-a.total);
  const bestDay=allRecs[0],worstDay=[...allRecs].reverse()[0];

  document.getElementById('hqbody').innerHTML=`
  <div class="metric-grid">
    <div class="metric ${tProfit>=0?'green':'red'}"><div class="metric-label">集團月淨利</div><div class="metric-value">$${格式化金額(tProfit)}</div><div class="metric-sub">${cprofitRate.toFixed(1)}% 淨利率</div></div>
    <div class="metric"><div class="metric-label">集團月營收</div><div class="metric-value">$${格式化金額(tRev)}</div></div>
    <div class="metric"><div class="metric-label">集團月成本</div><div class="metric-value">$${格式化金額(tCost)}</div></div>
    <div class="metric"><div class="metric-label">集團總來客數</div><div class="metric-value">${格式化金額(tGuests)}</div></div>
    <div class="metric amber"><div class="metric-label">平台費合計</div><div class="metric-value">$${格式化金額(tPFee)}</div></div>
    <div class="metric"><div class="metric-label">人事費合計</div><div class="metric-value">$${格式化金額(tLabor)}</div></div>
  </div>
  <div class="hq-brand-split">
    <div class="hq-brand-card brand-a">
      <div style="font-size:12px;font-weight:600;color:#8a6a2a;margin-bottom:10px">林家涼麵</div>
      ${[['月營收','$'+格式化金額(A.tRev)],['月淨利',(A.netProfit>=0?'+':'')+'$'+格式化金額(A.netProfit)],['來客數',格式化金額(A.tGuests)+'人'],['平均客單價','$'+格式化金額(A.aov)],['食材成本率',A.foodRate.toFixed(1)+'%'],['人事費用','$'+格式化金額(A.laborTotal)],['人均產值','$'+格式化金額(A.productivity)],['日均營收','$'+格式化金額(A.days?A.tRev/A.days:0)],['營業天數',A.days+' 天']].map(([l,v])=>`<div class="sum-row"><span class="sum-label" style="font-size:12px">${l}</span><span style="font-size:13px;font-weight:500">${v}</span></div>`).join('')}
    </div>
    <div class="hq-brand-card brand-b">
      <div style="font-size:12px;font-weight:600;color:#2a6b58;margin-bottom:10px">木谷食麵所</div>
      ${[['月營收','$'+格式化金額(B.tRev)],['月淨利',(B.netProfit>=0?'+':'')+'$'+格式化金額(B.netProfit)],['來客數',格式化金額(B.tGuests)+'人'],['平均客單價','$'+格式化金額(B.aov)],['食材成本率',B.foodRate.toFixed(1)+'%'],['人事費用','$'+格式化金額(B.laborTotal)],['人均產值','$'+格式化金額(B.productivity)],['日均營收','$'+格式化金額(B.days?B.tRev/B.days:0)],['營業天數',B.days+' 天']].map(([l,v])=>`<div class="sum-row"><span class="sum-label" style="font-size:12px">${l}</span><span style="font-size:13px;font-weight:500">${v}</span></div>`).join('')}

function 計算週結現金(recsA,recsB){
  const allRecs=[...recsA.map(r=>({...r,brand:'a'})),...recsB.map(r=>({...r,brand:'b'}))];
  if(!allRecs.length)return[];
  const weeks={};
  allRecs.forEach(r=>{
    const d=new Date(格式化日期(r.date));
    const day=d.getDay()||7;
    const mon=new Date(d);mon.setDate(d.getDate()-(day-1));
    const key=mon.toISOString().slice(0,10);
    if(!weeks[key])weeks[key]={cashA:0,cashB:0,endDate:''};
    if(r.brand==='a')weeks[key].cashA+=取應交現金(r);
    else weeks[key].cashB+=取應交現金(r);
    const end=new Date(mon);end.setDate(mon.getDate()+6);
    weeks[key].endDate=end.toISOString().slice(0,10);
    weeks[key].period=`${key.slice(5)} ~ ${end.toISOString().slice(5,10)}`;
  });
  return Object.keys(weeks).sort().map(k=>({...weeks[k]}));
}

function 加入配方原料(id,name,unit,price,spec,yieldRate){
  if(!window._recipe_rows)window._recipe_rows=[];
  const unitCost=spec&&yieldRate?price/spec/(yieldRate/100):0;
  const idx=window._recipe_idx||window._recipe_rows.length;
  window._recipe_rows.push({id,name,unit,unitCost,amount:1,_idx:idx});
  window._recipe_idx=(window._recipe_idx||0)+1;
  const list=document.getElementById('pf-recipe-list');
  if(list)list.insertAdjacentHTML('beforeend',商品配方行({name,unit,amount:1},idx));
  document.getElementById('pf-mat-search').value='';
  document.getElementById('pf-mat-results').innerHTML='';
  更新商品毛利();
}

function 移除配方行(i){
  document.getElementById(`recipe-row-${i}`)?.remove();
  if(window._recipe_rows)window._recipe_rows=window._recipe_rows.filter(r=>r._idx!==i);
  更新商品毛利();
}

function 更新商品毛利(){
  const rows=window._recipe_rows||[];
  let total=0;
  rows.forEach(r=>{
    const amt=+document.getElementById(`recipe-amt-${r._idx}`)?.value||0;
    const cost=r.unitCost*amt;
    total+=cost;
    const el=document.getElementById(`recipe-cost-${r._idx}`);
    if(el)el.textContent='$'+cost.toFixed(2);
  });
  const price=+document.getElementById('pf-price')?.value||0;
  const margin=price?((price-total)/price*100):0;
  const costEl=document.getElementById('pf-cost');
  const margEl=document.getElementById('pf-margin');
  if(costEl)costEl.textContent='$'+total.toFixed(2);
  if(margEl){margEl.textContent=price?(margin.toFixed(1)+'%'):'—';margEl.style.color=margin>=20?'#27ae60':margin>=10?'#e67e22':'#c0392b';}
}

async function 執行批量匯入(){
  const raw=document.getElementById('mat-csv')?.value||'';
  const rows=raw.trim().split('\n').filter(r=>r.trim()).map(r=>r.split('\t').map(c=>c.trim().replace(/^\$/, '')));
  const valid=rows.filter(r=>r.length>=4&&r[3]);
  if(!valid.length){提示('沒有偵測到有效資料，請確認格式');return;}
  if(!confirm(`確定匯入 ${valid.length} 筆原物料？`))return;
  載入中(true,`匯入中 0/${valid.length}...`);
  let ok=0;
  for(let i=0;i<valid.length;i++){
    const r=valid[i];
    // 欄位：分類|貨號|供應商|材料名稱|進價|規格|單位|得率%|得率單價(skip)|已處理(skip)|備註
    const record={
      category:r[0]||'其他',code:r[1]||'',supplier:r[2]||'',name:r[3],
      price:+r[4]||0,spec:+r[5]||0,unit:r[6]||'g',
      yieldRate:+(r[7]?.replace('%',''))||100,
      note:r.length>=11?r[10]||'':r[8]||''
    };
    const res=await 呼叫API({action:'saveMaterial',record});
    if(res.ok)ok++;
    document.querySelector('.loading-text')&&(document.querySelector('.loading-text').textContent=`匯入中 ${i+1}/${valid.length}...`);
  }
  載入中(false);
  提示(`✓ 成功匯入 ${ok} 筆，失敗 ${valid.length-ok} 筆`);
  渲染原物料管理();
}

function 預覽得率單價(){
  const price=+document.getElementById('mf-price')?.value||0;
  const spec=+document.getElementById('mf-spec')?.value||0;
  const yld=+document.getElementById('mf-yield')?.value||100;
  const unit=document.getElementById('mf-unit')?.value||'g';
  const el=document.getElementById('mf-preview');
  const el2=document.getElementById('mf-processed');
  if(!el)return;
  const processed=spec*(yld/100);
  const unitCost=processed?price/processed:0;
  el.textContent=price&&spec?'$'+unitCost.toFixed(2)+' / '+unit:'—';
  if(el2)el2.textContent=spec?processed.toFixed(processed%1===0?0:1)+' '+unit:'—';
}

async function 單張AI辨識(id){
  const apiKey=取得ApiKey();
  if(!apiKey){提示('請先在系統設定輸入 Claude API 金鑰');return}
  const item=_批次佇列.find(x=>x.id===id);
  if(!item)return;
  item.status='辨識中';渲染批次佇列();
  try{
    const base64=await 壓縮照片(item.file);
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
        {type:'text',text:'從這張台灣餐廳結帳單提取數據，只回傳JSON，不要其他文字。欄位：date(日期,格式YYYY-MM-DD,找不到用今天),cash(現金收入),linepay(LINE Pay 與線上點餐金流的金額加總),twpay(台灣PAY),uber(Uber門市實收),guests(交易筆數),cashShould(錢櫃應收現金),cashActual(錢櫃實點現金),voidAmt(作廢金額),txItems(銷售數量)。找不到設0。'}
      ]}]})
    });
    if(!resp.ok)throw new Error('API '+resp.status);
    const json=await resp.json();
    const match=json.content[0].text.match(/\{[\s\S]*\}/);
    if(!match)throw new Error('無法解析');
    const r=JSON.parse(match[0]);
    item.data={date:r.date||今日日期(),cash:r.cash||0,lp:r.linepay||0,tw:r.twpay||0,uber:r.uber||0,guests:r.guests||0,cashShould:r.cashShould||0,cashActual:r.cashActual||0,voidAmt:r.voidAmt||0,txItems:r.txItems||0};
    item.status='已辨識';
  }catch(e){item.status='辨識失敗';item.error=e.message;}
  渲染批次佇列();
}

    const tw=+(document.getElementById(`bq-tw-${item.id}`)?.value||item.data.tw||0);
    const uber=+(document.getElementById(`bq-uber-${item.id}`)?.value||item.data.uber||0);
    const guests=+(document.getElementById(`bq-guests-${item.id}`)?.value||item.data.guests||0);
    const cashShould=+(document.getElementById(`bq-cashShould-${item.id}`)?.value||item.data.cashShould||0);
    const cashActual=+(document.getElementById(`bq-cashActual-${item.id}`)?.value||item.data.cashActual||0);
    const total=cash+lp+tw+uber;
    const pFee=lp*(s.lp_rate/100)+uber*(s.uber_rate/100);
    let photo='';
    try{photo=await 壓縮照片(item.file);}catch(e){}
    const res=await 呼叫API({action:'saveRecord',record:{
      brand:br,date,guests,cash,lp,tw,uber,total,
      lp_rate:s.lp_rate,uber_rate:s.uber_rate,p_fee:pFee,
      cash_should:cashShould,cash_actual:cashActual,
      cash_short_over:cashActual-cashShould,
      void_amt:item.data.voidAmt||0,tx_items:item.data.txItems||0,
      uploaded_by:目前使用者?.email,photo
    }});
    if(res.ok){item.status='已儲存';成功++;}else{item.status='辨識失敗';item.error=res.error;失敗++;}
    渲染批次佇列();
  }
  載入中(false);
  提示(`✓ 已儲存 ${成功} 筆${失敗?'，失敗 '+失敗+' 筆':''}`);
}

// ===== 批發管理 =====
let b2bTab='apply';
async function 渲染批發管理(){
  const el=document.getElementById('page-批發管理');
  el.innerHTML=`
  <div class="brand-header"><span class="brand-badge badge-hq">醬醬人</span><span class="page-title">批發管理</span></div>
  <div class="inner-tabs">
    <button id="btab-apply" class="inner-tab ${b2bTab==='apply'?'active':''}" onclick="切換批發頁籤('apply')">申請審核</button>
    <button id="btab-order" class="inner-tab ${b2bTab==='order'?'active':''}" onclick="切換批發頁籤('order')">訂單管理</button>
  </div>
  <div id="b2b-panel"></div>`;
  載入批發資料();
}
function 切換批發頁籤(tab){
  b2bTab=tab;
  document.querySelectorAll('.inner-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('btab-'+tab)?.classList.add('active');
  載入批發資料();
}
async function 載入批發資料(){
  const panel=document.getElementById('b2b-panel');
  if(!panel)return;
  panel.innerHTML=`<div style="color:#aaa;padding:2rem;text-align:center">載入中...</div>`;
  if(b2bTab==='apply'){
    const res=await 呼叫API({action:'b2bGetApplications'});
    const list=res.data||[];
    if(!list.length){panel.innerHTML=`<div class="card"><div style="color:#aaa;text-align:center;padding:1.5rem">尚無申請記錄</div></div>`;return;}
    panel.innerHTML=`<div class="card"><div class="card-title">申請列表（${list.length} 筆）</div>
    ${list.map(r=>{
      const isPending=r.status==='pending'||r.status==='待審核'||!r.status;
      const badgeClass=r.status==='approved'||r.status==='審核通過'?'approved':r.status==='rejected'||r.status==='拒絕'?'rejected':'pending';
      const statusLabel=r.status==='approved'||r.status==='審核通過'?'已核准':r.status==='rejected'||r.status==='拒絕'?'已拒絕':'待審核';
      return`<div style="border:1px solid #e5e5df;border-radius:10px;padding:1rem;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-weight:600">${r.name||r.shopName||'—'}</span>
        <span class="badge badge-${badgeClass}">${statusLabel}</span>
      </div>
      <div style="font-size:13px;color:#666;display:grid;grid-template-columns:1fr 1fr;gap:4px 12px">
        <span>業態：${r.type||r.industry||'—'}</span><span>聯絡人：${r.contact||'—'}</span>
        <span>電話：${r.phone||'—'}</span><span>Email：${r.email||'—'}</span>
        <span style="grid-column:1/-1">地址：${r.address||'—'}</span>
        ${r.code?`<span style="grid-column:1/-1;color:#2a6b58;font-weight:600">客戶代碼：${r.code}</span>`:''}
        ${r.note?`<span style="grid-column:1/-1">備註：${r.note}</span>`:''}
      </div>
      ${isPending?`
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-hq btn-sm" onclick="審核批發('${r.code}','approve')">核准</button>
        <button class="btn btn-outline btn-sm" onclick="審核批發('${r.code}','reject')">拒絕</button>
      </div>`:''}
    </div>`;}).join('')}
    </div>`;
  } else {
    const res=await 呼叫API({action:'b2bGetOrders'});
    const list=res.data||[];
    if(!list.length){panel.innerHTML=`<div class="card"><div style="color:#aaa;text-align:center;padding:1.5rem">尚無訂單記錄</div></div>`;return;}
    panel.innerHTML=`<div class="card"><div class="card-title">訂單列表（${list.length} 筆）</div>
    <table><thead><tr><th>日期</th><th>客戶代碼</th><th>店家</th><th>金額</th><th>備註</th><th></th></tr></thead>
    <tbody>${list.map(r=>`<tr>
      <td>${String(r.date||r.created_at||'').slice(0,10)}</td>
      <td>${r.customerCode||r.code||'—'}</td>
      <td>${r.customerName||r.shopName||'—'}</td>
      <td>${+r.total?'$'+格式化金額(+r.total):'—'}</td>
      <td>${r.items||r.note||'—'}</td>
      <td><button class="btn btn-outline btn-sm" style="color:#c0392b;border-color:#c0392b" onclick="刪除B2B訂單('${r.orderId||r.id}')">刪除</button></td>
    </tr>`).join('')}</tbody></table>
    </div>`;
  }
}
async function 刪除B2B訂單(id){
  if(!confirm('確定要刪除這筆訂單？'))return;
  載入中(true,'刪除中...');
  const res=await 呼叫API({action:'b2bDeleteOrder',id});
  載入中(false);
  if(!res.ok){提示('刪除失敗：'+(res.error||''));return;}
  提示('✓ 已刪除');
  載入批發資料();
}
async function 審核批發(id,action){
  載入中(true,'處理中...');
  const res=await 呼叫API({action:'b2bApprove',id,approve:action==='approve'});
  載入中(false);
  if(!res.ok){提示('操作失敗：'+(res.error||''));return;}
  提示(action==='approve'?'✓ 已核准，客戶代碼已發送':'✓ 已拒絕');
  載入批發資料();
}

// ===== 成本表 =====
async function 渲染成本表(){
  const el=document.getElementById('page-成本表');
  el.innerHTML=`<div class="brand-header"><span class="brand-badge badge-hq">富郁霖企業社</span><span class="page-title">成本表</span></div><div style="color:#aaa;padding:2rem;text-align:center">載入中...</div>`;
  const [resP,resM]=await Promise.all([呼叫API({action:'getProducts'}),呼叫API({action:'getMaterials'})]);
  const products=resP.data||[];
  const matMap={};
  (resM.data||[]).forEach(m=>{matMap[m.id]=m;});
  if(!products.length){
    el.innerHTML=`<div class="brand-header"><span class="brand-badge badge-hq">富郁霖企業社</span><span class="page-title">成本表</span></div><div class="card" style="text-align:center;color:#aaa;padding:2rem">尚無商品，請先在「商品管理」建立商品</div>`;
    return;
  }
  // 依分類群組
  const groups={};
  products.forEach(p=>{
    const g=p.category||'其他';
    if(!groups[g])groups[g]=[];
    groups[g].push(p);
  });
  let html=`<div class="brand-header"><span class="brand-badge badge-hq">富郁霖企業社</span><span class="page-title">成本表</span></div>`;
  Object.entries(groups).forEach(([cat,prods])=>{
    html+=`<div class="card" style="margin-bottom:1.25rem">
      <div class="card-title">${cat}</div>`;
    prods.forEach(p=>{
      const cost=+p.cost||0;
      const price=+p.price||0;
      const margin=price?((price-cost)/price*100):0;
      const marginColor=margin>=30?'#27ae60':margin>=15?'#e67e22':'#c0392b';
      const recipe=p.recipe?JSON.parse(p.recipe):[];
      const b2bEnabled=p.b2bEnabled==='true'||p.b2bEnabled===true;
      const pkgSize=+p.packageSize||0;
      const b2bPrice=+p.b2bPrice||0;
      html+=`<div style="border:1px solid #e8e8e2;border-radius:10px;margin-bottom:10px;overflow:hidden">
        <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;background:#fafaf7"
          onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
          <div style="flex:1">
            <div style="font-size:14px;font-weight:600">${p.name}${p.spec?` <span style="font-size:12px;color:#888;font-weight:400">${p.spec}</span>`:''}
              ${b2bEnabled?`<span style="font-size:11px;background:#e8f4ff;color:#1a7fd4;border-radius:4px;padding:2px 6px;margin-left:6px">批發</span>`:''}
            </div>
            ${p.note?`<div style="font-size:11px;color:#aaa;margin-top:2px">${p.note}</div>`:''}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:13px">售價 <strong>$${格式化金額(price)}</strong></div>
            <div style="font-size:12px;color:#888">食材成本 $${cost.toFixed(2)}</div>
          </div>
          <div style="min-width:56px;text-align:right">
            <div style="font-size:16px;font-weight:700;color:${marginColor}">${margin.toFixed(1)}%</div>
            <div style="font-size:10px;color:#aaa">毛利率</div>
          </div>
          <div style="color:#bbb;font-size:12px">▼</div>
        </div>
        <div style="display:none;border-top:1px solid #eee;padding:14px 16px;background:#fff">
          ${recipe.length?`
          <table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px">
            <thead><tr style="color:#999;font-size:11px">
              <th style="text-align:left;padding:4px 8px;border-bottom:1px solid #f0f0ec">原料名稱</th>
              <th style="text-align:right;padding:4px 8px;border-bottom:1px solid #f0f0ec">用量</th>
              <th style="text-align:right;padding:4px 8px;border-bottom:1px solid #f0f0ec">單位</th>
              <th style="text-align:right;padding:4px 8px;border-bottom:1px solid #f0f0ec">單位成本</th>
              <th style="text-align:right;padding:4px 8px;border-bottom:1px solid #f0f0ec">小計</th>
              <th style="text-align:right;padding:4px 8px;border-bottom:1px solid #f0f0ec">佔比</th>
            </tr></thead>
            <tbody>
            ${recipe.map(r=>{
              const sub=r.unitCost*r.amount;
              const pct=cost>0?(sub/cost*100):0;
              return`<tr>
                <td style="padding:5px 8px;border-bottom:1px solid #f8f8f4">${r.name}</td>
                <td style="padding:5px 8px;border-bottom:1px solid #f8f8f4;text-align:right">${r.amount}</td>
                <td style="padding:5px 8px;border-bottom:1px solid #f8f8f4;text-align:right;color:#888">${r.unit}</td>
                <td style="padding:5px 8px;border-bottom:1px solid #f8f8f4;text-align:right;color:#888">$${r.unitCost.toFixed(2)}</td>
                <td style="padding:5px 8px;border-bottom:1px solid #f8f8f4;text-align:right;font-weight:500">$${sub.toFixed(2)}</td>
                <td style="padding:5px 8px;border-bottom:1px solid #f8f8f4;text-align:right;color:#888">${pct.toFixed(1)}%</td>
              </tr>`;
            }).join('')}
            </tbody>
          </table>
          <div style="display:flex;justify-content:flex-end;gap:24px;font-size:13px;padding:8px 8px 0;border-top:1px solid #f0f0ec">
            <span style="color:#888">食材成本合計</span>
            <strong>$${cost.toFixed(2)}</strong>
          </div>`:'<div style="color:#aaa;font-size:13px;padding:8px">尚未設定配方</div>'}
          ${b2bEnabled?`<div style="margin-top:12px;padding:10px 12px;background:#f0f7ff;border-radius:8px;font-size:13px;display:flex;gap:24px;flex-wrap:wrap">
            <span>🏪 批發價 <strong>$${格式化金額(b2bPrice)}/袋</strong></span>
            ${pkgSize?`<span>每袋 <strong>${pkgSize} 包</strong>　單包均攤 $${pkgSize?(b2bPrice/pkgSize).toFixed(2):'—'}</span>`:''}
            <span>批發毛利率 <strong style="color:${b2bPrice&&pkgSize&&cost?(((b2bPrice/pkgSize-cost)/(b2bPrice/pkgSize)*100)>=20?'#27ae60':'#e67e22'):'#888'}">${b2bPrice&&pkgSize&&cost?(((b2bPrice/pkgSize-cost)/(b2bPrice/pkgSize)*100).toFixed(1)+'%'):'—'}</strong></span>
          </div>`:''}
        </div>
      </div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

初始化();
