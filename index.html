async function еЈ“зё®з…§зүҮ(file){
  return new Promise(resolve=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const maxW=400,scale=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas');
      c.width=img.width*scale;c.height=img.height*scale;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg',0.4).split(',')[1]);
    };
    img.src=url;
  });
}

function жӣҙж–°иЈңеЎ«е·®з•°(id,sys,val){

async function е„Іеӯҳеҝ«йҖҹиЈңеЎ«(br,ids){
  ијүе…Ҙдёӯ(true,'е„Іеӯҳдёӯ...');
  let count=0;
  for(const id of ids){
    const input=document.getElementById(`qf-${id}`);

    const actual=+input.value||0;
    const sysEl=input.closest('tr')?.querySelector('td:nth-child(2)');

    await е‘јеҸ«API({action:'updateRecord',record:{id,handover_actual:actual,handover_diff:actual-sys}});
    count++;

  жҸҗзӨә(`вң“ е·Іе„Іеӯҳ ${count} зӯҶдёҠз№ійҮ‘йЎҚ`);
  жёІжҹ“жӯ·еҸІиЁҳйҢ„(br);
}

  ${(()=>{
    // E. е®ўе–®еғ№и¶ЁеӢўпјҲиҝ‘6еҖӢжңҲпјү

    allRecs.forEach(r=>{

function иЁҲз®—йҖұзөҗзҸҫйҮ‘(recsA,recsB,ym){
  const allRecs=[...recsA.map(r=>({...r,brand:'a'})),...recsB.map(r=>({...r,brand:'b'}))];
  if(!allRecs.length)return[];
  const weeks={};
  const inferYm=ym||(allRecs[0]?.date?.slice(0,7));
  const [_ey,_em]=inferYm?inferYm.split('-').map(Number):[0,0];
  const monthEnd=_ey?new Date(_ey,_em,0):null;
  allRecs.forEach(r=>{
    const d=new Date(ж јејҸеҢ–ж—Ҙжңҹ(r.date));
    const day=d.getDay()||7;
    const mon=new Date(d);mon.setDate(d.getDate()-(day-1));
    const key=mon.toISOString().slice(0,10);
    if(!weeks[key])weeks[key]={cashA:0,cashB:0,endDate:''};
    if(r.brand==='a')weeks[key].cashA+=еҸ–жҮүдәӨзҸҫйҮ‘(r);
    else weeks[key].cashB+=еҸ–жҮүдәӨзҸҫйҮ‘(r);
    const end=new Date(mon);end.setDate(mon.getDate()+6);
    const dispEnd=monthEnd&&end>monthEnd?monthEnd:end;
    const isPartial=monthEnd&&end>monthEnd;
    weeks[key].endDate=dispEnd.toISOString().slice(0,10);
    weeks[key].period=`${key.slice(5)} ~ ${dispEnd.toISOString().slice(5,10)}${isPartial?' (жңҲеә•)':''}`;
  });
  return Object.keys(weeks).sort().map(k=>({...weeks[k]}));
}

async function еҹ·иЎҢжү№йҮҸеҢҜе…Ҙ(){
  const raw=document.getElementById('mat-csv')?.value||'';
  const rows=raw.trim().split('\n').filter(r=>r.trim()).map(r=>r.split('\t').map(c=>c.trim().replace(/^\$/, '')));
  const valid=rows.filter(r=>r.length>=4&&r[3]);
  if(!valid.length){жҸҗзӨә('жІ’жңүеҒөжё¬еҲ°жңүж•ҲиіҮж–ҷпјҢи«ӢзўәиӘҚж јејҸ');return;}
  if(!confirm(`зўәе®ҡеҢҜе…Ҙ ${valid.length} зӯҶеҺҹзү©ж–ҷпјҹ`))return;
  ијүе…Ҙдёӯ(true,`еҢҜе…Ҙдёӯ 0/${valid.length}...`);
  let ok=0;
  for(let i=0;i<valid.length;i++){
    const r=valid[i];
    // ж¬„дҪҚпјҡеҲҶйЎһ|иІЁиҷҹ|дҫӣжҮүе•Ҷ|жқҗж–ҷеҗҚзЁұ|йҖІеғ№|иҰҸж ј|е–®дҪҚ|еҫ—зҺҮ%|еҫ—зҺҮе–®еғ№(skip)|е·Іиҷ•зҗҶ(skip)|еӮҷиЁ»
    const record={
      category:r[0]||'е…¶д»–',code:r[1]||'',supplier:r[2]||'',name:r[3],
      price:+r[4]||0,spec:+r[5]||0,unit:r[6]||'g',
      yieldRate:+(r[7]?.replace('%',''))||100,
      note:r.length>=11?r[10]||'':r[8]||''
    };
    const res=await е‘јеҸ«API({action:'saveMaterial',record});
    if(res.ok)ok++;
    document.querySelector('.loading-text')&&(document.querySelector('.loading-text').textContent=`еҢҜе…Ҙдёӯ ${i+1}/${valid.length}...`);
  }
  ијүе…Ҙдёӯ(false);
  жҸҗзӨә(`вң“ жҲҗеҠҹеҢҜе…Ҙ ${ok} зӯҶпјҢеӨұж•— ${valid.length-ok} зӯҶ`);
  жёІжҹ“еҺҹзү©ж–ҷз®ЎзҗҶ();
}

function й җиҰҪеҫ—зҺҮе–®еғ№(){
  const price=+document.getElementById('mf-price')?.value||0;
  const spec=+document.getElementById('mf-spec')?.value||0;
  const yld=+document.getElementById('mf-yield')?.value||100;
  const unit=document.getElementById('mf-unit')?.value||'g';
  const el=document.getElementById('mf-preview');
  const el2=document.getElementById('mf-processed');

  const processed=spec*(yld/100);

  if(el2)el2.textContent=spec?processed.toFixed(processed%1===0?0:1)+' '+unit:'вҖ”';
}

async function е„ІеӯҳеҺҹзү©ж–ҷ(id){
  const name=document.getElementById('mf-name')?.value?.trim();
  if(!name){жҸҗзӨә('и«ӢеЎ«еҜ«жқҗж–ҷеҗҚзЁұ');return;}
  const record={
    id:id||undefined,
    category:document.getElementById('mf-category')?.value||'е…¶д»–',
    code:document.getElementById('mf-code')?.value?.trim(),
    supplier:document.getElementById('mf-supplier')?.value?.trim(),
    name,
    price:+document.getElementById('mf-price')?.value||0,
    spec:+document.getElementById('mf-spec')?.value||0,
    unit:document.getElementById('mf-unit')?.value,
    yieldRate:+document.getElementById('mf-yield')?.value||100,
    note:document.getElementById('mf-note')?.value?.trim(),
    purchaseUnit:document.getElementById('mf-purUnit')?.value?.trim()||'',
    purchaseUnitQty:+document.getElementById('mf-purQty')?.value||1,
    currentStock:+document.getElementById('mf-stock')?.value||0
  };
  const oldName=(document.getElementById('mf-old-name')?.value||'').trim();
  const newName=name;
  ијүе…Ҙдёӯ(true,'е„Іеӯҳдёӯ...');
  const res=await е‘јеҸ«API({action:'saveMaterial',record});
  ијүе…Ҙдёӯ(false);
  if(!res.ok){жҸҗзӨә('е„ІеӯҳеӨұж•—пјҡ'+(res.error||''));return;}
  // еҗҚзЁұжңүж”№вҶ’иҮӘеӢ•еҗҢжӯҘжүҖжңүе•Ҷе“Ғй…Қж–№
  if(oldName&&newName&&oldName!==newName){
    try{
      const resP=await е‘јеҸ«API({action:'getProducts'});
      const prods=resP.data||resP.products||[];
      const toUpdate=prods.filter(p=>{
        try{return JSON.parse(p.recipe||'[]').some(i=>i.name===oldName);}catch{return false;}
      });
      for(const p of toUpdate){
        const recipe=JSON.parse(p.recipe);
        recipe.forEach(i=>{if(i.name===oldName)i.name=newName;});
        await е‘јеҸ«API({action:'saveProduct',record:{...p,recipe:JSON.stringify(recipe)}});
      }
      if(toUpdate.length)жҸҗзӨә(`вң“ е·Іе„ІеӯҳпјҢдёҰеҗҢжӯҘжӣҙж–° ${toUpdate.length} зӯҶе•Ҷе“Ғй…Қж–№`);
      else жҸҗзӨә('вң“ е·Іе„Іеӯҳ');
    }catch{жҸҗзӨә('вң“ е·Іе„ІеӯҳпјҲй…Қж–№еҗҢжӯҘеӨұж•—пјҢи«ӢжүӢеӢ•зўәиӘҚпјү');}
  }else{
    жҸҗзӨә('вң“ е·Іе„Іеӯҳ');
  }
  жёІжҹ“еҺҹзү©ж–ҷз®ЎзҗҶ();
}

  steps.push(`гҖҗеҢ…иЈқгҖ‘дҪҝз”ЁжЁҷжә–е®№еҷЁеҢ…иЈқпјҢжҜҸд»Ҫ ${p.spec||'дҫқиҰҸж ј'}пјҢе…ұ ${qty} д»ҪгҖӮиІјдёҠе“ҒеҗҚгҖҒж—ҘжңҹжЁҷзұӨеҫҢж”ҫе…ҘеҶ·и—ҸпјҸеҫ…еҮәиІЁеҚҖгҖӮ`);

async function йҖҒеҮәе…§йғЁиЁӮиіј(br){
  const date=document.getElementById(`io-date-${br}`)?.value;
  if(!date){жҸҗзӨә('и«ӢйҒёж“Үж—Ҙжңҹ');return;}
  const items=[];
  document.querySelectorAll(`#io-items-${br} input[type=number]`).forEach(inp=>{
    const qty=+inp.value||0;
    if(qty<=0)return;
    items.push({
      productId:inp.dataset.pid,
      productName:inp.dataset.name,
      spec:inp.dataset.spec,
      qty,
      unitCost:+inp.dataset.cost,
      totalCost:qty*(+inp.dataset.cost)
    });
  });
  if(items.length===0){жҸҗзӨә('и«ӢиҮіе°‘ијёе…ҘдёҖй …ж•ёйҮҸ');return;}
  ијүе…Ҙдёӯ(true,'йҖҒеҮәдёӯ...');
  const results=await Promise.all(items.map(item=>
    е‘јеҸ«API({action:'saveInternalOrder',record:{brand:br,date,...item}})
  ));
  ијүе…Ҙдёӯ(false);
  if(results.every(r=>r.ok)){
    // жүЈе•Ҷе“Ғеә«еӯҳ
    const resP=await е‘јеҸ«API({action:'getProducts'});
    const prods=resP.data||[];
    await Promise.all(items.map(item=>{
      const prod=prods.find(p=>p.id===item.productId);
      if(!prod)return;
      const newStock=Math.max(0,(+prod.currentStock||0)-item.qty);
      return е‘јеҸ«API({action:'saveProduct',record:{...prod,currentStock:newStock}});
    }));
    жҸҗзӨә('вң“ иЁӮиіје·ІиЁҳйҢ„пјҢе•Ҷе“Ғеә«еӯҳе·ІжүЈжёӣ');

  } else жҸҗзӨә('йғЁеҲҶе„ІеӯҳеӨұж•—пјҢи«ӢйҮҚи©Ұ');
}

function з№ӘиЈҪеҲҶжһҗең–иЎЁ(days){
  const rA=window._ana_rA||[], rB=window._ana_rB||[];
  const cutoff=days<9999?new Date(Date.now()-days*86400000).toISOString().slice(0,10):'0000-00-00';
  const fA=rA.filter(r=>r.date>=cutoff), fB=rB.filter(r=>r.date>=cutoff);

  // в‘  жҜҸж—ҘзҮҹж”¶и¶ЁеӢў
  _destroyChart('rev');

  const revDates=[...new Set([...fA,...fB].map(r=>toYMD(r.date)))].filter(Boolean).sort();
  const revLabels=revDates.map(d=>d.slice(5).replace('-','/'));
  const revMapA=Object.fromEntries(fA.map(r=>[toYMD(r.date),+r.total||0]));
  const revMapB=Object.fromEntries(fB.map(r=>[toYMD(r.date),+r.total||0]));
  _charts['rev']=new Chart(document.getElementById('chart-rev'),{
    type:'line',
    data:{labels:revLabels,datasets:[
      {label:'жһ—е®¶ж¶јйәө',data:revDates.map(d=>revMapA[d]||0),borderColor:'#c49a6c',backgroundColor:'rgba(196,154,108,0.1)',tension:0.3,fill:true,pointRadius:2},
      {label:'жңЁи°·йЈҹйәөжүҖ',data:revDates.map(d=>revMapB[d]||0),borderColor:'#6b8f71',backgroundColor:'rgba(107,143,113,0.1)',tension:0.3,fill:true,pointRadius:2}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{y:{beginAtZero:false,ticks:{callback:v=>v>=10000?(v/10000).toFixed(1)+'иҗ¬':'$'+v}}}}
  });

  // в‘Ў жҳҹжңҹе№ҫе№іеқҮзҮҹж”¶
  _destroyChart('dow');
  const dowLabels=['йҖұдёҖ','йҖұдәҢ','йҖұдёү','йҖұеӣӣ','йҖұдә”','йҖұе…ӯ','йҖұж—Ҙ'];
  function avgByDow(recs){
    const sum=[0,0,0,0,0,0,0],cnt=[0,0,0,0,0,0,0];
    recs.filter(r=>(+r.total||0)>0).forEach(r=>{
      const ymd=toYMD(r.date);
      const[y,m,d]=ymd.split('-').map(Number);
      const dow=new Date(y,m-1,d).getDay();
      const idx=(dow+6)%7;
      sum[idx]+=(+r.total||0);cnt[idx]++;
    });
    return sum.map((s,i)=>cnt[i]?Math.round(s/cnt[i]):0);
  }
  _charts['dow']=new Chart(document.getElementById('chart-dow'),{
    type:'bar',
    data:{labels:dowLabels,datasets:[
      {label:'жһ—е®¶ж¶јйәө',data:avgByDow(fA),backgroundColor:'rgba(196,154,108,0.7)',borderRadius:6},

function иЁҲз®—е·®з•°(input, sysStock){
  const actual=parseFloat(input.value);
  const sys=parseFloat(sysStock)||0;
  const tr=input.closest('tr');
  const mid=input.dataset.mid;
  const diffCell=document.querySelector(`.sc-diff-${mid}`);
  if(!diffCell)return;
  if(isNaN(actual)){diffCell.textContent='вҖ”';diffCell.style.color='#aaa';tr.style.background='';return;}
  const diff=actual-sys;
  diffCell.textContent=(diff>=0?'+':'')+diff;
  if(diff===0){diffCell.style.color='#27ae60';tr.style.background='';}
  else if(Math.abs(diff)<=sys*0.05||Math.abs(diff)<=2){diffCell.style.color='#c8a96e';tr.style.background='#fffdf5';}
  else{diffCell.style.color='#c0392b';tr.style.background='#fff5f5';}
}
